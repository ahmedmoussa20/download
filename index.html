<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>قرآن هداية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{--g:#0D6E5B;--g2:#0A5849;--gold:#C9A44F;--bg:#f5faf8;--txt:#18312e}
@media(prefers-color-scheme:dark){:root{--bg:#071513;--txt:#fff}}
*{box-sizing:border-box}body{margin:0;font-family:Cairo,sans-serif;background:
radial-gradient(circle at top left,#0d6e5b22,transparent 30%),
radial-gradient(circle at bottom right,#c9a44f22,transparent 30%),var(--bg);
display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{max-width:520px;width:100%;padding:38px;border-radius:28px;background:rgba(255,255,255,.72);backdrop-filter:blur(18px);box-shadow:0 20px 60px rgba(0,0,0,.12);text-align:center}
.logo{font-size:50px;font-weight:800;color:var(--g)}.logo span{color:var(--gold)}
.badge{display:inline-block;margin:12px 0 18px;padding:8px 16px;border-radius:99px;background:#e8f4f1;color:var(--g);font-weight:700}
#status{font-size:20px;font-weight:700;color:var(--g);margin:12px 0}
.progress{height:8px;background:#dfe8e5;border-radius:99px;overflow:hidden;margin:20px 0}
.bar{height:100%;width:0;background:linear-gradient(90deg,var(--gold),var(--g));transition:width .8s}
.btns{display:none;gap:12px;flex-direction:column}
.btn{display:flex;align-items:center;justify-content:center;padding:16px;border-radius:14px;text-decoration:none;font-weight:700}
.play{background:linear-gradient(135deg,var(--g),var(--g2));color:#fff}
.ios{border:2px solid var(--g);color:var(--g)}
.qr{display:none;margin-top:20px}
.qr img{width:180px;height:180px;border-radius:12px;background:#fff;padding:8px}
small{display:block;margin-top:16px;color:#6b7a77}
</style>
</head>
<body>
<div class="card">
<div class="logo">قرآن <span>هداية</span></div>
<div class="badge">مرحبًا بك ✨</div>
<div id="status">جارٍ اكتشاف جهازك...</div>
<div class="progress"><div class="bar" id="bar"></div></div>

<div class="btns" id="btns">
<a class="btn play" href="https://play.google.com/store/apps/details?id=app.hidaya">📱 تحميل للأندرويد</a>
<a class="btn ios" href="https://apps.apple.com/eg/app/quran-hidaya-%D9%82%D8%B1%D8%A2%D9%86-%D9%87%D8%AF%D8%A7%D9%8A%D8%A9/id1566553099?l=ar">🍎 تحميل للآيفون</a>
</div>

<div class="qr" id="qrBox">
<p>امسح الـ QR من الهاتف</p>
<img id="qr">
</div>

<small>© Hidaya App</small>
</div>

<script>
const PLAY="https://play.google.com/store/apps/details?id=app.hidaya";
const IOS="https://apps.apple.com/eg/app/quran-hidaya-%D9%82%D8%B1%D8%A2%D9%86-%D9%87%D8%AF%D8%A7%D9%8A%D8%A9/id1566553099?l=ar";
const SMART="https://ahmedmoussa20.github.io/download/";
const ua=navigator.userAgent;
const desktop=!/Android|iPhone|iPad|iPod/i.test(ua);
const status=document.getElementById("status");
const bar=document.getElementById("bar");
let target=PLAY,name="Google Play";
if(/iPad|iPhone|iPod/i.test(ua)){target=IOS;name="App Store";}
if(desktop){
 status.innerHTML="استخدم الأزرار أو امسح رمز QR";
 document.getElementById("btns").style.display="flex";
 document.getElementById("qrBox").style.display="block";
 document.getElementById("qr").src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data="+encodeURIComponent(SMART);
 bar.style.width="100%";
}else{
 let msgs=[
 "جارٍ اكتشاف جهازك...",
 "✔ تم اكتشاف "+name,
 "جارٍ فتح "+name+"..."
 ];
 let i=0;
 function step(){
   status.innerHTML=msgs[i];
   bar.style.width=((i+1)/3*100)+"%";
   i++;
   if(i<msgs.length)setTimeout(step,900);
   else setTimeout(()=>location.replace(target),700);
 }
 step();
}
</script>
</body>
</html>
