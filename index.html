<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تحميل تطبيق قرآن هداية</title>
<meta name="description" content="تحميل تطبيق قرآن هداية">
<meta property="og:title" content="تحميل تطبيق قرآن هداية">
<meta property="og:description" content="رفيقك اليومي للقرآن والأذكار ومواقيت الصلاة">
<meta name="theme-color" content="#0D6E5B">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
--green:#0d6e5b;--green2:#0a5849;--gold:#c9a44f;
--bg:#f5faf8;--card:rgba(255,255,255,.72);
--text:#16312d;--muted:#667874;
}
@media(prefers-color-scheme:dark){
:root{
--bg:#071513;--card:rgba(15,30,28,.72);
--text:#fff;--muted:#c7d2cf;
}}
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Cairo,sans-serif;
background:
radial-gradient(circle at 10% 10%,rgba(13,110,91,.16),transparent 30%),
radial-gradient(circle at 90% 90%,rgba(201,164,79,.16),transparent 30%),
var(--bg);
display:flex;align-items:center;justify-content:center;
min-height:100vh;padding:20px;overflow:hidden;color:var(--text)}
.pattern{position:fixed;inset:0;opacity:.06;
background-image:
radial-gradient(circle,#0d6e5b 1.8px,transparent 2px),
radial-gradient(circle,#c9a44f 1.8px,transparent 2px);
background-size:90px 90px;
animation:move 25s linear infinite}
@keyframes move{to{transform:translate(90px,90px)}}
.card{
width:min(95%,520px);
background:var(--card);
backdrop-filter:blur(18px);
border-radius:28px;
padding:42px 34px;
text-align:center;
box-shadow:0 20px 60px rgba(0,0,0,.12);
border:1px solid rgba(255,255,255,.25)}
.logo{font-size:48px;font-weight:800;color:var(--green)}
.logo span{color:var(--gold)}
.badge{display:inline-block;margin:14px 0 18px;padding:7px 16px;border-radius:50px;background:rgba(13,110,91,.12);color:var(--green);font-weight:700}
p{line-height:1.9;color:var(--muted);margin-bottom:18px}
.counter{font-size:42px;font-weight:800;color:var(--green)}
.progress{height:8px;background:#dfe7e4;border-radius:99px;margin:20px 0;overflow:hidden}
.bar{height:100%;width:0;background:linear-gradient(90deg,var(--gold),var(--green));transition:1s linear}
.btn{
display:flex;justify-content:center;align-items:center;gap:10px;
padding:17px;border-radius:16px;
background:linear-gradient(135deg,var(--green),var(--green2));
color:#fff;text-decoration:none;font-weight:700;
position:relative;overflow:hidden}
.btn:before{
content:"";position:absolute;top:0;left:-150%;
width:70%;height:100%;
background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);
transform:skewX(-25deg);
animation:shine 2.8s infinite}
@keyframes shine{100%{left:180%}}
.icons{margin-top:18px;color:var(--muted);font-size:14px}
.desktop{display:none;margin-top:18px}
.qr{
width:170px;height:170px;margin:10px auto;border-radius:14px;
background:#fff;padding:8px}
.footer{margin-top:18px;font-size:13px;color:var(--muted)}
</style>
</head>
<body>
<div class="pattern"></div>
<div class="card">
<div class="logo">قرآن <span>هداية</span></div>
<div class="badge">مرحبًا بك في قرآن هداية ✨</div>
<p>سيتم تحويلك تلقائيًا إلى متجر التطبيقات المناسب لجهازك.</p>
<div class="counter" id="counter">3</div>
<div class="progress"><div class="bar" id="bar"></div></div>
<a class="btn" id="downloadBtn" href="#">تحميل التطبيق</a>
<div class="desktop" id="desktopBox">
<p>أو امسح رمز QR بالموبايل</p>
<img class="qr" id="qr" alt="QR Code">
</div>
<div class="icons" id="device"></div>
<div class="footer">© Hidaya App</div>
</div>
<script>
const play="https://play.google.com/store/apps/details?id=app.hidaya";
const ios="https://apps.apple.com/eg/app/quran-hidaya-%D9%82%D8%B1%D8%A2%D9%86-%D9%87%D8%AF%D8%A7%D9%8A%D8%A9/id1566553099?l=ar";
const ua=navigator.userAgent;
let url=play,label="Google Play";
if(/iPad|iPhone|iPod/i.test(ua)){url=ios;label="App Store";}
const desktop=!/Android|iPhone|iPad|iPod/i.test(ua);
document.getElementById("downloadBtn").href=url;
document.getElementById("device").textContent=desktop?"Google Play • App Store":"سيتم فتح "+label;
if(desktop){
document.getElementById("desktopBox").style.display="block";
document.getElementById("qr").src="https://api.qrserver.com/v1/create-qr-code/?size=170x170&data="+encodeURIComponent(play);
}
let n=3;
const c=document.getElementById("counter");
const b=document.getElementById("bar");
b.style.width="33%";
const t=setInterval(()=>{
n--;
b.style.width=((4-n)*33)+"%";
if(n>0){c.textContent=n;}
else{
c.textContent="✓";
clearInterval(t);
if(!desktop){window.location.replace(url);}
}
},1000);
</script>
</body>
</html>
